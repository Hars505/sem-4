<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, intial-scale=1.0" />
    <title>JSON</title>
    <script>
      function firstlast(arr = [])
      {
          if(arr.length == 0) 
          {
            return null;
          }
          var temp = {[arr[0]] : arr[arr.length - 1]};
          return temp;
      }
      var result = firstlast([1,2,3,4,5]);
      console.log(result);
    </script>
  </head>
  <body style="background-color: lightskyblue"></body>
</html>
