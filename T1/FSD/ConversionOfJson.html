<head>
    <meta charset="UTF-8">

    <title>JSON</title>
    <script>
        var jsonData = JSON.parse(`{
            "var1":"LJ",
            "var2":"University"
        }`);
        var jsonData2 = JSON.stringify({
            var1:"LJ",
            var2:"University"
        });
        console.log(jsonData);
        console.log(jsonData2);
    </script>
</head>
</html>
