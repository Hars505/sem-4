<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Show ID</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #f7fafc;
      }
      .card {
        background: #fff;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        width: 340px;
      }
      label {
        font-size: 14px;
        color: #374151;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 10px;
        border: 0;
        background: #2563eb;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
      }
      .result {
        margin-top: 16px;
        padding: 12px;
        border-radius: 6px;
        background: #eef2ff;
        color: #1e3a8a;
        font-weight: 600;
        text-align: center;
      }
      .hint {
        font-size: 12px;
        color: #6b7280;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h2>Show ID</h2>
      <label for="idInput">Enter ID</label>
      <input id="idInput" type="text" placeholder="e.g. 12345" />
      <button id="showBtn">Show ID</button>
      <div
        id="result"
        class="result"
        aria-live="polite"
        style="display: none"
      ></div>
      <p class="hint">
        Or pass ?id=YOUR_ID in the page URL to auto-display it.
      </p>
    </main>
    <script>
      const input = document.getElementById("idInput");
      const btn = document.getElementById("showBtn");
      const result = document.getElementById("result");
      function displayId(id) {
        if (!id) {
          result.style.display = "none";
          return;
        }
        result.textContent = "ID: " + id;
        result.style.display = "block";
      }
      btn.addEventListener("click", () => displayId(input.value.trim())); // show id from query param if present const params = new URLSearchParams(location.search); const qid = params.get('id'); if(qid){ input.value = qid; displayId(qid); }
    </script>
  </body>
</html>
