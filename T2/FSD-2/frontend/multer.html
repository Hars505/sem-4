<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Upload with Multer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 400px;
        margin: 60px auto;
        background: #fff;
        padding: 2em;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
        color: #333;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 1em;
      }
      input[type="file"] {
        padding: 0.5em;
      }
      button {
        background: #007bff;
        color: #fff;
        border: none;
        padding: 0.75em;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1em;
      }
      button:hover {
        background: #0056b3;
      }
      .msg {
        margin-top: 1em;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Upload a File</h2>
      <form
        id="uploadForm"
        action="/upload"
        method="POST"
        enctype="multipart/form-data"
      >
        <input type="file" name="multerFile[]" accept=".jpg,.jpeg"multiple required />
        <button type="submit">Upload</button>
      </form>
      <div class="msg" id="msg"></div>
    </div>
    <script>
      // document.getElementById('uploadForm').addEventListener('submit', function(e) {
      //     e.preventDefault();
      // });
    </script>
  </body>
</html>
